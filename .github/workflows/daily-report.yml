name: Cursor Usage Report

on:
  schedule:
    # 19:00 IST Mon–Fri = 13:30 UTC Mon–Fri (IST = UTC+5:30, weekends excluded)
    - cron: "30 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CURSOR_SESSION_TOKEN: ${{ secrets.CURSOR_SESSION_TOKEN }}
  CURSOR_USER_ID: ${{ secrets.CURSOR_USER_ID }}
  GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
  NEXT_PUBLIC_BASE_URL: http://localhost:3000

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify required secrets
        run: |
          if [ -z "$CURSOR_SESSION_TOKEN" ]; then
            echo "::error::Repository secret CURSOR_SESSION_TOKEN is missing."
            exit 1
          fi
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then
            echo "::error::Repository secret GOOGLE_CHAT_WEBHOOK is missing."
            exit 1
          fi
          echo "Required secrets are present."

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app and wait for readiness
        run: |
          npm run start &
          echo $! > .next.pid
          npx wait-on http://localhost:3000 -t 120000

      - name: Capture screenshot
        run: npm run capture

      - name: Stop app
        if: always()
        run: |
          if [ -f .next.pid ]; then kill "$(cat .next.pid)" || true; fi

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-usage-report
          path: public/usage-report.png
          if-no-files-found: error
          retention-days: 14

      - name: Publish screenshot for Google Chat
        id: publish_screenshot
        run: |
          if [ ! -f public/usage-report.png ]; then
            echo "::error::public/usage-report.png is missing after capture."
            exit 1
          fi
          URL=$(npx tsx scripts/publishScreenshot.ts)
          echo "SCREENSHOT_URL=$URL" >> "$GITHUB_ENV"
          echo "Published dashboard image: $URL"

      - name: Send report to Google Chat
        env:
          SCREENSHOT_URL: ${{ env.SCREENSHOT_URL }}
        run: npm run report
